<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aquir.ai — Deal strategy intelligence for revenue teams</title>
  <meta name="description" content="Aquir is deal strategy intelligence for revenue teams. Stop losing deals your product should win. Request early access." />
  <meta name="theme-color" content="#ECF7D9" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="aquir.ai — Deal strategy intelligence for revenue teams" />
  <meta property="og:description" content="Stop losing deals your product should win." />
  <meta property="og:url" content="https://aquir.ai" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23152316'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='20' fill='%23ECF7D9'>a</text></svg>" />
</head>
<body>

  <!-- ============================= HERO ============================= -->
  <section class="hero" id="hero">
    <div class="blobs" aria-hidden="true">
      <span class="blob blob--1"></span>
      <span class="blob blob--2"></span>
      <span class="blob blob--3"></span>
      <span class="blob blob--4"></span>
    </div>

    <header class="site-header">
      <a class="brand" href="/" aria-label="aquir.ai home">
        <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="16" fill="#152316" />
          <text x="16" y="23" text-anchor="middle" font-weight="700" font-size="20" fill="#ffffff">a</text>
        </svg>
        aquir.ai
      </a>
      <a class="btn btn--contact" href="mailto:hello@aquir.ai?subject=Contact%20Aquir">Contact us</a>
    </header>

    <div class="hero__content">
      <h1>Stop losing deals<br />your product<br />should win.</h1>
      <p class="sub">Deal strategy intelligence for revenue teams.</p>

      <!-- Early-access capture. Static site: set `action` to a form endpoint
           (e.g. a free Formspree form) to collect real signups. Until then the
           button just shows the confirmation. -->
      <form class="signup" id="signup" action="" method="POST" novalidate>
        <label class="signup__label" for="email"><b>Email</b><span class="req">(required)</span></label>
        <input id="email" name="email" type="email" required placeholder="you@company.com" autocomplete="email" />
        <button type="submit">Request Early Access</button>
      </form>
      <p class="signup__ok" id="signup-ok" hidden>Thanks — you're on the early-access list.</p>
    </div>

    <button class="motion-toggle" id="motion-toggle" type="button" aria-pressed="false" aria-label="Pause background animation">
      <svg class="ic ic--pause" viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="2" width="3.5" height="12" rx="1"/><rect x="9.5" y="2" width="3.5" height="12" rx="1"/></svg>
      <svg class="ic ic--play" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 2.5l9 5.5-9 5.5z"/></svg>
    </button>
  </section>

  <!-- ============================ FOOTER ============================ -->
  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__cols">
        <div>
          <a class="brand" href="/" aria-label="aquir.ai home">
            <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="16" cy="16" r="16" fill="#ECF7D9" />
              <text x="16" y="23" text-anchor="middle" font-weight="700" font-size="20" fill="#152316">a</text>
            </svg>
            aquir.ai
          </a>
          <nav class="footer-links" aria-label="Footer">
            <a href="mailto:hello@aquir.ai?subject=Careers%20at%20Aquir">Careers</a>
            <a href="mailto:hello@aquir.ai?subject=Contact%20Aquir">Contact Us</a>
          </nav>
        </div>
        <p class="site-footer__blurb">Built for revenue leaders at fast-growing B2B software companies.</p>
      </div>
      <hr class="site-footer__rule" />
      <p class="site-footer__copy">&copy; <span id="year">2026</span> Aquir</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // motion pause/play toggle
    var hero = document.getElementById('hero');
    var toggle = document.getElementById('motion-toggle');
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      hero.classList.add('is-paused');
      toggle.setAttribute('aria-pressed', 'true');
      toggle.setAttribute('aria-label', 'Play background animation');
    }
    toggle.addEventListener('click', function () {
      var paused = hero.classList.toggle('is-paused');
      toggle.setAttribute('aria-pressed', String(paused));
      toggle.setAttribute('aria-label', (paused ? 'Play' : 'Pause') + ' background animation');
    });

    // email capture — confirm client-side until a form backend is wired
    var form = document.getElementById('signup');
    var ok = document.getElementById('signup-ok');
    form.addEventListener('submit', function (e) {
      var email = form.email;
      if (!email.value || !email.checkValidity()) { email.reportValidity(); e.preventDefault(); return; }
      if (!form.getAttribute('action')) { e.preventDefault(); form.hidden = true; ok.hidden = false; }
    });
  </script>
</body>
</html>
